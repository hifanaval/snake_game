
<style>
*{box-sizing:border-box;margin:0;padding:0}
#sg{font-family:var(--font-sans);background:#0a0a12;min-height:600px;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;border-radius:var(--border-radius-lg)}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;transition:opacity .3s;z-index:10}
.screen.hidden{opacity:0;pointer-events:none}
h1.logo{font-size:38px;font-weight:500;color:#4ade80;letter-spacing:2px;text-shadow:0 0 20px #4ade8066}
.sub{font-size:13px;color:#6b7280;letter-spacing:3px;text-transform:uppercase}
.btn{background:transparent;border:1px solid #4ade8066;color:#4ade80;padding:10px 28px;border-radius:8px;font-size:14px;cursor:pointer;transition:all .2s;font-family:var(--font-sans);letter-spacing:1px}
.btn:hover{background:#4ade8022;border-color:#4ade80;box-shadow:0 0 12px #4ade8044}
.btn.danger{border-color:#f8716666;color:#f87166}
.btn.danger:hover{background:#f8716622;border-color:#f87166}
.btn.gold{border-color:#fbbf2466;color:#fbbf24}
.btn.gold:hover{background:#fbbf2422;border-color:#fbbf24}
.diff-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.diff-btn{padding:10px 20px;border-radius:8px;border:1px solid #ffffff22;color:#9ca3af;background:transparent;font-size:13px;cursor:pointer;transition:all .2s;font-family:var(--font-sans)}
.diff-btn.active,.diff-btn:hover{color:#4ade80;border-color:#4ade80;background:#4ade8011}
.stat-row{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.stat{text-align:center}
.stat .val{font-size:26px;font-weight:500;color:#4ade80}
.stat .lbl{font-size:11px;color:#6b7280;letter-spacing:2px;text-transform:uppercase;margin-top:2px}
#canvas-wrap{position:relative;display:flex;align-items:center;justify-content:center;padding:16px}
canvas{display:block;border-radius:4px;image-rendering:pixelated}
#hud{position:absolute;top:16px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 24px;z-index:20;pointer-events:none}
#hud .h-box{background:#0a0a1288;border:1px solid #ffffff11;border-radius:6px;padding:6px 14px;text-align:center;pointer-events:all}
#hud .h-lbl{font-size:10px;color:#6b7280;letter-spacing:2px;text-transform:uppercase}
#hud .h-val{font-size:20px;font-weight:500;color:#f0fdf4}
#hud .h-val.green{color:#4ade80}
#hud .h-val.gold{color:#fbbf24}
#hud .h-val.red{color:#f87166}
#pause-btn{background:#0a0a1288;border:1px solid #ffffff22;color:#9ca3af;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:var(--font-sans);pointer-events:all}
#pause-btn:hover{color:#fff;border-color:#ffffff44}
.countdown{font-size:80px;font-weight:500;color:#4ade80;text-shadow:0 0 30px #4ade80;animation:pop .4s ease-out}
@keyframes pop{0%{transform:scale(1.6);opacity:0}100%{transform:scale(1);opacity:1}}
.go-text{font-size:40px;font-weight:500;color:#4ade80;text-shadow:0 0 20px #4ade80;animation:pop .3s ease-out}
.combo{font-size:13px;color:#fbbf24;letter-spacing:1px}
#score-pop{position:absolute;font-size:18px;font-weight:500;color:#4ade80;pointer-events:none;z-index:30;opacity:0;transition:all .6s}
.hs-badge{background:#fbbf2422;border:1px solid #fbbf2466;color:#fbbf24;padding:6px 20px;border-radius:20px;font-size:13px;letter-spacing:1px}
.instr{font-size:12px;color:#6b7280;text-align:center;line-height:1.8;max-width:300px}
#sound-btn{position:absolute;top:16px;right:16px;background:transparent;border:1px solid #ffffff22;color:#6b7280;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:var(--font-sans);z-index:40}
#sound-btn:hover{color:#fff;border-color:#ffffff44}
.bg-lines{position:absolute;inset:0;opacity:.04;pointer-events:none;z-index:0}
</style>

<div id="sg">
<svg class="bg-lines" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg">
  <defs><pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0L0 0 0 30" fill="none" stroke="#4ade80" stroke-width="0.5"/></pattern></defs>
  <rect width="100%" height="100%" fill="url(#grid)"/>
</svg>

<button id="sound-btn">🔊 SFX</button>
<div id="score-pop"></div>

<div id="screen-start" class="screen">
  <div class="sub">arcade classics</div>
  <h1 class="logo">🐍 SNAKE</h1>
  <div class="sub" style="color:#4ade8088">eat &bull; grow &bull; survive</div>
  <div style="height:8px"></div>
  <div class="diff-row" id="diff-row">
    <button class="diff-btn" data-d="easy">Easy<br><span style="font-size:10px;opacity:.6">10 pts · slow</span></button>
    <button class="diff-btn active" data-d="medium">Medium<br><span style="font-size:10px;opacity:.6">20 pts · normal</span></button>
    <button class="diff-btn" data-d="hard">Hard<br><span style="font-size:10px;opacity:.6">30 pts · fast</span></button>
  </div>
  <div id="hs-display" style="font-size:13px;color:#fbbf24">Best: 0</div>
  <button class="btn" id="play-btn">▶ PLAY</button>
  <div class="instr">Arrow keys or WASD to move<br>P or ESC to pause<br>Eat combos for bonus points!</div>
</div>

<div id="screen-countdown" class="screen hidden">
  <div id="cd-num" class="countdown">3</div>
</div>

<div id="screen-game" class="screen hidden" style="justify-content:flex-start;padding:0;gap:0">
  <div id="hud">
    <div class="h-box"><div class="h-lbl">score</div><div class="h-val green" id="hud-score">0</div></div>
    <div style="display:flex;gap:8px;align-items:center">
      <button id="pause-btn">⏸ PAUSE</button>
    </div>
    <div class="h-box"><div class="h-lbl">best</div><div class="h-val gold" id="hud-best">0</div></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="gc"></canvas>
  </div>
  <div style="display:flex;gap:16px;padding:4px 0 8px;z-index:20">
    <div class="h-box"><div class="h-lbl">combo</div><div class="h-val" id="hud-combo" style="color:#fbbf24">x1</div></div>
    <div class="h-box"><div class="h-lbl">length</div><div class="h-val" id="hud-len" style="color:#60a5fa">3</div></div>
    <div class="h-box"><div class="h-lbl">level</div><div class="h-val" id="hud-diff" style="color:#c084fc">MED</div></div>
  </div>
</div>

<div id="screen-pause" class="screen hidden">
  <h1 class="logo" style="font-size:28px">PAUSED</h1>
  <button class="btn" id="resume-btn">▶ RESUME</button>
  <button class="btn danger" id="quit-btn">✕ QUIT</button>
</div>

<div id="screen-gameover" class="screen hidden">
  <div id="hs-new" class="hs-badge hidden">🏆 NEW HIGH SCORE!</div>
  <h1 class="logo" style="font-size:28px;color:#f87166">GAME OVER</h1>
  <div class="stat-row">
    <div class="stat"><div class="val" id="go-score">0</div><div class="lbl">score</div></div>
    <div class="stat"><div class="val" style="color:#fbbf24" id="go-best">0</div><div class="lbl">best</div></div>
    <div class="stat"><div class="val" style="color:#60a5fa" id="go-apples">0</div><div class="lbl">apples</div></div>
  </div>
  <div id="go-msg" style="font-size:13px;color:#6b7280"></div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
    <button class="btn" id="replay-btn">↻ REPLAY</button>
    <button class="btn gold" id="menu-btn">⌂ MENU</button>
  </div>
</div>
</div>

<script>
const $ = id => document.getElementById(id);
const sg = $('sg');
const cvs = $('gc');
const ctx = cvs.getContext('2d');

const DIFF = {
  easy:   {speed:140, pts:10,  sz:20, cols:20, label:'EASY', color:'#4ade80'},
  medium: {speed:100, pts:20,  sz:18, cols:22, label:'MED',  color:'#60a5fa'},
  hard:   {speed:65,  pts:30,  sz:16, cols:26, label:'HARD', color:'#f87166'},
};

let diff='medium', snake, dir, nextDir, apple, bonusApple, score, combo, applesEaten, gameLoop, paused, running, sfxOn=true, highScores={easy:0,medium:0,hard:0}, gamesPlayed=0, totalApples=0;

try{
  const saved=JSON.parse(localStorage.getItem('snakeHS')||'{}');
  if(saved.easy) highScores.easy=saved.easy;
  if(saved.medium) highScores.medium=saved.medium;
  if(saved.hard) highScores.hard=saved.hard;
  if(saved.gamesPlayed) gamesPlayed=saved.gamesPlayed;
  if(saved.totalApples) totalApples=saved.totalApples;
}catch(e){}

function saveHS(){
  try{localStorage.setItem('snakeHS',JSON.stringify({...highScores,gamesPlayed,totalApples}));}catch(e){}
}

$('hs-display').textContent = 'Best: ' + highScores[diff];
$('hud-best').textContent = highScores[diff];

// Audio
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx;
function getACtx(){if(!actx)actx=new AudioCtx();return actx;}
function beep(freq,dur,type='square',vol=0.12){
  if(!sfxOn)return;
  try{
    const a=getACtx();const o=a.createOscillator();const g=a.createGain();
    o.connect(g);g.connect(a.destination);o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
    o.start(a.currentTime);o.stop(a.currentTime+dur);
  }catch(e){}
}
function eatSound(){beep(880,.08);setTimeout(()=>beep(1100,.08),60);}
function dieSound(){[200,160,120].forEach((f,i)=>setTimeout(()=>beep(f,.18,'sawtooth',.2),i*100));}
function btnSound(){beep(440,.06,'sine',.08);}

// Screens
function showScreen(id){
  ['screen-start','screen-countdown','screen-game','screen-pause','screen-gameover'].forEach(s=>{
    const el=$(s);
    if(el.id===id){el.classList.remove('hidden');}
    else{el.classList.add('hidden');}
  });
}

// Difficulty buttons
document.querySelectorAll('.diff-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    diff=b.dataset.d;
    $('hs-display').textContent='Best: '+highScores[diff];
    btnSound();
  });
});

$('play-btn').addEventListener('click',()=>{btnSound();startCountdown();});
$('pause-btn').addEventListener('click',()=>{btnSound();togglePause();});
$('resume-btn').addEventListener('click',()=>{btnSound();togglePause();});
$('quit-btn').addEventListener('click',()=>{btnSound();endGame(false,true);});
$('replay-btn').addEventListener('click',()=>{btnSound();startCountdown();});
$('menu-btn').addEventListener('click',()=>{btnSound();goMenu();});
$('sound-btn').addEventListener('click',()=>{sfxOn=!sfxOn;$('sound-btn').textContent=sfxOn?'🔊 SFX':'🔇 SFX';});

function goMenu(){
  running=false;clearInterval(gameLoop);
  showScreen('screen-start');
  $('hs-display').textContent='Best: '+highScores[diff];
}

function startCountdown(){
  running=false;clearInterval(gameLoop);
  showScreen('screen-countdown');
  let n=3;
  const cd=$('cd-num');
  cd.textContent=n;cd.className='countdown';
  const t=setInterval(()=>{
    n--;
    if(n>0){cd.textContent=n;cd.className='countdown';cd.style.cssText='';void cd.offsetWidth;cd.style.animation='none';cd.style.animation='';}
    else if(n===0){cd.textContent='GO!';cd.className='go-text';}
    else{clearInterval(t);startGame();}
  },700);
}

function initCanvas(){
  const d=DIFF[diff];
  const size=d.cols*d.sz;
  cvs.width=size;cvs.height=size;
  cvs.style.width=size+'px';cvs.style.height=size+'px';
}

function startGame(){
  initCanvas();
  showScreen('screen-game');
  const d=DIFF[diff];
  $('hud-diff').textContent=d.label;
  $('hud-diff').style.color=d.color;
  $('hud-best').textContent=highScores[diff];

  const mid=Math.floor(d.cols/2);
  snake=[{x:mid,y:mid},{x:mid-1,y:mid},{x:mid-2,y:mid}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  score=0;combo=1;applesEaten=0;paused=false;running=true;
  apple=spawnApple();bonusApple=null;
  updateHUD();
  draw();
  clearInterval(gameLoop);
  gameLoop=setInterval(step,d.speed);
  gamesPlayed++;saveHS();
}

function spawnApple(){
  const d=DIFF[diff];
  let pos;
  do{pos={x:Math.floor(Math.random()*d.cols),y:Math.floor(Math.random()*d.cols)};}
  while(snake.some(s=>s.x===pos.x&&s.y===pos.y)||(bonusApple&&bonusApple.x===pos.x&&bonusApple.y===pos.y));
  return pos;
}

function step(){
  if(!running||paused)return;
  dir={...nextDir};
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  const d=DIFF[diff];

  // Wall collision
  if(head.x<0||head.x>=d.cols||head.y<0||head.y>=d.cols){
    endGame(true);return;
  }
  // Self collision
  if(snake.some(s=>s.x===head.x&&s.y===head.y)){
    endGame(true);return;
  }

  snake.unshift(head);

  let ate=false;
  if(head.x===apple.x&&head.y===apple.y){
    ate=true;
    const pts=DIFF[diff].pts*combo;
    score+=pts;applesEaten++;totalApples++;
    eatSound();showScorePop('+'+pts,head);
    combo=Math.min(combo+1,8);
    apple=spawnApple();
    // Spawn bonus apple occasionally
    if(applesEaten%5===0&&!bonusApple){
      bonusApple=spawnApple();
      setTimeout(()=>{bonusApple=null;},6000);
    }
    if(score>highScores[diff]){highScores[diff]=score;saveHS();}
    $('hud-best').textContent=highScores[diff];
  } else if(bonusApple&&head.x===bonusApple.x&&head.y===bonusApple.y){
    ate=true;
    const pts=DIFF[diff].pts*combo*3;
    score+=pts;applesEaten++;totalApples++;
    eatSound();beep(1400,.1);showScorePop('🌟+'+pts,head);
    combo=Math.min(combo+2,8);
    bonusApple=null;
    if(score>highScores[diff]){highScores[diff]=score;saveHS();}
    $('hud-best').textContent=highScores[diff];
  } else {
    snake.pop();
    combo=Math.max(1,combo-(1/15));
  }

  updateHUD();
  draw();
}

function updateHUD(){
  $('hud-score').textContent=score;
  $('hud-combo').textContent='x'+Math.floor(combo);
  $('hud-len').textContent=snake.length;
}

function showScorePop(txt,cell){
  const d=DIFF[diff];
  const sz=d.sz;
  const wrap=$('canvas-wrap');
  const wRect=wrap.getBoundingClientRect();
  const cRect=cvs.getBoundingClientRect();
  const el=$('score-pop');
  el.textContent=txt;
  el.style.left=(cRect.left-wRect.left+cell.x*sz+sz/2-20)+'px';
  el.style.top=(cRect.top-wRect.top+cell.y*sz-10)+'px';
  el.style.opacity='1';el.style.transform='translateY(0)';
  setTimeout(()=>{el.style.opacity='0';el.style.transform='translateY(-30px)';},100);
}

function draw(){
  const d=DIFF[diff];
  const sz=d.sz;
  const cols=d.cols;
  ctx.fillStyle='#0d1117';
  ctx.fillRect(0,0,cvs.width,cvs.height);

  // Grid dots
  ctx.fillStyle='#1a2030';
  for(let x=0;x<cols;x++)for(let y=0;y<cols;y++){ctx.fillRect(x*sz+sz/2-1,y*sz+sz/2-1,2,2);}

  // Border glow
  ctx.strokeStyle='#4ade8033';ctx.lineWidth=2;
  ctx.strokeRect(1,1,cvs.width-2,cvs.height-2);

  // Snake
  snake.forEach((s,i)=>{
    const ratio=1-i/snake.length;
    const r=Math.floor(74*ratio);const g=Math.floor(222*ratio+50*(1-ratio));const b=Math.floor(128*ratio);
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    const pad=i===0?1:2;
    if(i===0){
      ctx.shadowColor='#4ade80';ctx.shadowBlur=10;
    }else{ctx.shadowBlur=0;}
    roundRect(ctx,s.x*sz+pad,s.y*sz+pad,sz-pad*2,sz-pad*2,i===0?4:3);
    ctx.shadowBlur=0;
  });

  // Eyes on head
  if(snake.length>0){
    const h=snake[0];
    ctx.fillStyle='#0d1117';
    const ex=dir.y!==0?sz*.35:sz*.65;const ey=dir.x!==0?sz*.35:sz*.65;
    const ex2=dir.y!==0?sz*.65:sz*.65;const ey2=dir.x!==0?sz*.65:sz*.35;
    ctx.beginPath();ctx.arc(h.x*sz+ex,h.y*sz+ey,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(h.x*sz+ex2,h.y*sz+ey2,2.5,0,Math.PI*2);ctx.fill();
  }

  // Apple
  drawApple(apple.x,apple.y,sz,'#f87166','#ff4444');

  // Bonus apple
  if(bonusApple){
    drawApple(bonusApple.x,bonusApple.y,sz,'#fbbf24','#f59e0b');
    ctx.font=`bold ${sz-4}px sans-serif`;ctx.fillStyle='#fbbf24';
    ctx.fillText('★',bonusApple.x*sz+2,bonusApple.y*sz+sz-2);
  }
}

function drawApple(x,y,sz,color,glow){
  ctx.shadowColor=glow;ctx.shadowBlur=12;
  ctx.fillStyle=color;
  ctx.beginPath();ctx.arc(x*sz+sz/2,y*sz+sz/2,sz/2-3,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // shine
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.beginPath();ctx.arc(x*sz+sz/2-2,y*sz+sz/2-2,sz/5,0,Math.PI*2);ctx.fill();
  // stem
  ctx.strokeStyle='#15803d';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x*sz+sz/2,y*sz+2);ctx.lineTo(x*sz+sz/2+3,y*sz-1);ctx.stroke();
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();ctx.fill();
}

function endGame(collision, quit){
  running=false;clearInterval(gameLoop);
  if(collision)dieSound();
  if(!quit){
    totalApples+=0;saveHS();
    const isNew=score>0&&score===highScores[diff];
    $('go-score').textContent=score;
    $('go-best').textContent=highScores[diff];
    $('go-apples').textContent=applesEaten;
    $('hs-new').classList.toggle('hidden',!isNew);
    const msgs=['Slithered into oblivion!','The wall wins again.','Self-collision: tragic.','A serpentine demise.','Physics: 1, Snake: 0'];
    $('go-msg').textContent=collision?msgs[Math.floor(Math.random()*msgs.length)]:'';
    showScreen('screen-gameover');
  }
}

function togglePause(){
  if(!running)return;
  paused=!paused;
  if(paused)showScreen('screen-pause');
  else showScreen('screen-game');
}

// Keyboard
document.addEventListener('keydown',e=>{
  const key=e.key;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','a','d','w','s'].includes(key))e.preventDefault();
  if(key==='p'||key==='P'||key==='Escape'){if(running)togglePause();return;}
  if(!running||paused)return;
  const moves={'ArrowLeft':{x:-1,y:0},'ArrowRight':{x:1,y:0},'ArrowUp':{x:0,y:-1},'ArrowDown':{x:0,y:1},
    'a':{x:-1,y:0},'d':{x:1,y:0},'w':{x:0,y:-1},'s':{x:0,y:1}};
  const m=moves[key];
  if(m&&!(m.x===-dir.x&&m.y===dir.y)&&!(m.x===dir.x&&m.y===dir.y))nextDir=m;
});

// Touch/swipe
let tx=0,ty=0;
sg.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
sg.addEventListener('touchend',e=>{
  if(!running||paused)return;
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<20&&Math.abs(dy)<20)return;
  let m;
  if(Math.abs(dx)>Math.abs(dy))m=dx>0?{x:1,y:0}:{x:-1,y:0};
  else m=dy>0?{x:0,y:1}:{x:0,y:-1};
  if(!(m.x===-dir.x&&m.y===dir.y))nextDir=m;
},{passive:true});
</script>
